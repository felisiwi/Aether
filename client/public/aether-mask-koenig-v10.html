<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a0500; width: 100vw; height: 100vh; overflow: hidden; }
canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.logo-wrap { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
video { width: 55%; height: auto; -webkit-mask-image: url("/aether_logo_white.svg"); mask-image: url("/aether_logo_white.svg"); -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat; -webkit-mask-position: center; mask-position: center; -webkit-mask-size: 100% auto; mask-size: 100% auto; }
#tweak-root { position: fixed; top: 0; right: 0; z-index: 100; font-family: ui-monospace, "Cascadia Code", "SF Mono", Menlo, monospace; }
#tweak-toggle {
  position: absolute; top: 8px; right: 8px; width: 32px; height: 32px;
  border: 1px solid rgba(255,255,255,.2); border-radius: 4px;
  background: rgba(0,0,0,.45); color: rgba(255,255,255,.85); font-size: 16px; line-height: 1; cursor: pointer;
}
#tweak-toggle:hover { background: rgba(0,0,0,.65); }
#tweak-panel {
  width: 220px; margin-top: 44px; margin-right: 8px; padding: 16px;
  background: rgba(0,0,0,.55); border: 1px solid rgba(255,255,255,.12); border-radius: 6px;
  max-height: calc(100vh - 56px); overflow-y: auto;
}
#tweak-root.collapsed #tweak-panel { display: none; }
.tweak-row { margin-bottom: 12px; }
.tweak-row:last-of-type { margin-bottom: 0; }
.tweak-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
.tweak-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: rgba(255,255,255,.45); }
.tweak-val { font-size: 10px; color: rgba(255,255,255,.65); }
.tweak-row input[type="range"] { width: 100%; accent-color: #c96; }
#tweak-copy {
  width: 100%; margin-top: 14px; padding: 8px; font: inherit; font-size: 11px;
  border: 1px solid rgba(255,255,255,.2); border-radius: 4px; background: rgba(255,255,255,.08); color: rgba(255,255,255,.8); cursor: pointer;
}
#tweak-copy:hover { background: rgba(255,255,255,.14); }
#sound-osc-row { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
#sound-osc-row button {
  flex: 1;
  min-width: 0;
  padding: 4px 2px;
  font-family: inherit;
  font-size: 9px;
  background: #1a0800;
  color: rgba(255,150,80,0.85);
  border: 1px solid rgba(255,100,40,0.4);
  cursor: pointer;
}
#sound-osc-row button.selected {
  background: rgba(255,100,40,0.35);
  color: #fff;
}
#gravity-toggle-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-top: 4px;
}
#gravity-toggle-row button {
  flex: 1;
  min-width: 0;
  padding: 4px 2px;
  font-family: inherit;
  font-size: 9px;
  background: #1a0800;
  color: rgba(255,150,80,0.85);
  border: 1px solid rgba(255,100,40,0.4);
  cursor: pointer;
}
#gravity-toggle-row button.selected {
  background: rgba(255,100,40,0.35);
  color: #fff;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint" style="position:absolute;bottom:32px;left:50%;transform:translateX(-50%);font-family:'Courier New',monospace;font-size:11px;letter-spacing:0.14em;color:rgba(255,150,80,0.4);pointer-events:none;user-select:none;">
MOVE IN CIRCLES TO PLAY
</div>
<div class="logo-wrap">
<video autoplay muted loop playsinline>
<source src="aether-bg.mp4" type="video/mp4">
</video>
</div>
<div id="tweak-root">
<button type="button" id="tweak-toggle" aria-expanded="true" title="Toggle controls">≡</button>
<div id="tweak-panel"></div>
</div>
<script>
const canvas = document.getElementById("c");
const gl = canvas.getContext("webgl");
const vert = `attribute vec2 a; void main(){gl_Position=vec4(a,0,1);}`;
const frag = `precision mediump float;
uniform vec2 u_res, u_mouse, u_mouse2;
uniform float u_time;
uniform float u_glowCoreRadius, u_glowCoreIntensity;
uniform float u_glowWideRadius, u_glowWideIntensity;
uniform float u_warpStrength, u_noiseAmount, u_darkness;
uniform float u_waveCount, u_waveFreq, u_waveSpeed, u_rippleStrength;
uniform float u_idle;
uniform float u_activeBand;
uniform float u_mouseX;
uniform float u_polarAngle;
uniform float u_polarDist;
uniform float u_octaveDist;
uniform float u_hintBand0;
uniform float u_hintBand1;
uniform float u_flickerSpeed;
uniform float u_flickerAmount;
uniform float u_waveSharpness;
uniform float u_gravityStrength;
uniform float u_octaveAmount;
uniform float u_octaveDirection;
uniform float u_velocity;
uniform float u_velX;
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5);
}
float h(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5);}
float sn(vec2 p){vec2 i=floor(p),f=fract(p);f=f*f*(3.-2.*f);return mix(mix(h(i),h(i+vec2(1,0)),f.x),mix(h(i+vec2(0,1)),h(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<4;i++){v+=a*sn(p);p*=2.;a*=.5;}return v;}
#define PI 3.14159265358979
const float ACTIVE_BAND_GLOW = 1.0;
float wrapAng(float a) {
  return atan(sin(a), cos(a));
}
void main() {
  vec2 uv = gl_FragCoord.xy / u_res;
  vec2 m = u_mouse / u_res;
  vec2 m2 = u_mouse2 / u_res;
  float t = u_time;
  float aspect = u_res.x / u_res.y;
  vec2 uvA = vec2(uv.x * aspect, uv.y);
  vec2 mA = vec2(m.x * aspect, m.y);
  float mouseDist = length(uvA - mA);
  float ripple = sin(mouseDist * 18.0 - t * 4.0)
                 * exp(-mouseDist * 4.0)
                 * u_rippleStrength;
  vec2 m2A = vec2(m2.x * aspect, m2.y);
  float mouseDist2 = length(uvA - m2A);
  float ripple2 = sin(mouseDist2 * 14.0 - t * 3.0)
                  * exp(-mouseDist2 * 3.5)
                  * u_rippleStrength * 0.5;
  vec2 smokeUV = uv * 2.5 + vec2(t * 0.04, t * 0.04);
  vec2 sd = vec2(fbm(smokeUV), fbm(smokeUV + vec2(1.7)));
  float smoke = fbm(uv * 1.8 + sd * u_warpStrength * 0.4 + t * 0.06);
  smoke = clamp(smoke * u_noiseAmount * 0.6, 0.0, 1.0);
  vec2 centre = vec2(0.5, 0.5);
  vec2 fromCentre = uv - centre;
  fromCentre.x *= aspect;
  float angle = atan(fromCentre.y, fromCentre.x);
  float dist = length(fromCentre);
  float waves = 0.0;
  float wc = u_waveCount;
  for (int i = 0; i < 12; i++) {
    if (float(i) >= wc) break;
    float fi = float(i) / wc;
    float bandAngle = (fi - 0.5) * PI * 2.0;
    float harmonic = 1.0 + float(i) * 0.5;
    float phase = fi * 6.28 + t * u_waveSpeed * harmonic * 0.3;
    float wobble = sin(dist * u_waveFreq * harmonic + phase)
                   * 0.04 * u_rippleStrength;
    float da = angle - bandAngle + wobble;
    da = wrapAng(da);
    float flicker = 1.0 + u_flickerAmount *
      sin(t * u_flickerSpeed * harmonic + fi * 12.0)
      + u_idle * 0.3 * sin(t * 1.5 * harmonic + fi * 3.0);
    float isActive = 1.0 - step(0.5, abs(float(i) - u_activeBand));
    float warmGlow = isActive * ACTIVE_BAND_GLOW * 1.4;
    float activeWidth = 1.0 + isActive * ACTIVE_BAND_GLOW * 0.4;
    float band = exp(-da * da * (u_waveSharpness * 0.1 / activeWidth)) * flicker;
    band *= 1.0 + warmGlow;
    float isWell = 0.0;
    if (abs(float(i) - 0.0) < 0.5) isWell = 1.0;
    if (abs(float(i) - 4.0) < 0.5) isWell = 1.0;
    if (abs(float(i) - 7.0) < 0.5) isWell = 1.0;
    band *= 1.0 + isWell * u_gravityStrength * 0.35;
    float isHint0 = 1.0 - step(0.5, abs(float(i) - u_hintBand0));
    float isHint1 = 1.0 - step(0.5, abs(float(i) - u_hintBand1));
    band *= 1.0 + (isHint0 + isHint1) * 0.4;
    float radialFade = smoothstep(0.05, 0.25, dist) *
                       smoothstep(0.95, 0.7, dist);
    waves += band * radialFade;
  }
  waves = clamp(waves * u_noiseAmount, 0.0, 1.0);
  vec2 smokeOff = vec2(
    sin(uv.y * 8.0 + t * 0.5) * 0.02,
    sin(uv.x * 6.0 + t * 0.4) * 0.015
  ) * u_warpStrength;
  float dg = length(uv + smokeOff - m);
  float dg2 = length(uv + smokeOff * 1.4 - m2);
  float glowWide = pow(max(0., 1. - dg / u_glowWideRadius), 2.0)
                   * u_glowWideIntensity;
  float glowCore = pow(max(0., 1. - dg / u_glowCoreRadius), 3.0)
                   * u_glowCoreIntensity;
  float glowTrail = pow(max(0., 1. - dg2 / 0.22), 2.0) * 0.2;
  float velBurst = u_velocity * exp(-mouseDist * mouseDist * 80.0) * 0.3;
  float glow = glowWide + glowCore + glowTrail;
  float ring1 = exp(-pow((dist - 0.33) * 20.0, 2.0)) * 0.08;
  float ring2 = exp(-pow((dist - 0.66) * 20.0, 2.0)) * 0.08;
  float rings = (ring1 + ring2) * u_polarDist;
  float cursorAngle = u_polarAngle;
  float dAngle = wrapAng(angle - cursorAngle);
  dAngle = abs(dAngle);
  float cursorLine = exp(-pow(dAngle * 12.0, 2.0)) * 0.12 * smoothstep(0.05, 0.15, dist);
  float edgeGlow = 0.0;
  if (u_octaveDirection > 0.0) {
    edgeGlow = u_octaveAmount * exp(-pow((uv.y - 1.0) * 8.0, 2.0)) * 0.6;
  } else {
    edgeGlow = u_octaveAmount * exp(-pow(uv.y * 8.0, 2.0)) * 0.6;
  }
  float v = clamp(smoke * 0.7 + waves + glow * 0.7 + rings + cursorLine + velBurst + edgeGlow, 0.0, 1.0);
  vec3 col = mix(vec3(u_darkness, u_darkness * 0.3, 0.0),
                 vec3(0.4, 0.08, 0.01),
                 smoothstep(0.0, 0.25, v));
  col = mix(col, vec3(0.75, 0.2, 0.02),
            smoothstep(0.2, 0.55, v));
  col = mix(col, vec3(1.0, 0.55, 0.1),
            smoothstep(0.5, 0.85, v));
  col = mix(col, vec3(1.0, 0.9, 0.7),
            smoothstep(0.8, 1.0, v));
  col = mix(col, col * vec3(1.0, 0.85, 0.6), u_mouseX * 0.3);
  float grain = (hash(uv * u_res * 0.4 + t * 300.0) - 0.5) * 0.04;
  col += grain;
  gl_FragColor = vec4(clamp(col, 0.0, 1.0), 1.0);
}`;
function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);return x;}
const p=gl.createProgram();
gl.attachShader(p,sh(gl.VERTEX_SHADER,vert));
gl.attachShader(p,sh(gl.FRAGMENT_SHADER,frag));
gl.linkProgram(p);gl.useProgram(p);
const b=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,b);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const al=gl.getAttribLocation(p,"a");
gl.enableVertexAttribArray(al);
gl.vertexAttribPointer(al,2,gl.FLOAT,false,0,0);
const ur=gl.getUniformLocation(p,"u_res"),um=gl.getUniformLocation(p,"u_mouse"),um2=gl.getUniformLocation(p,"u_mouse2"),ut=gl.getUniformLocation(p,"u_time");
const uGlowCoreRadius=gl.getUniformLocation(p,"u_glowCoreRadius");
const uGlowCoreIntensity=gl.getUniformLocation(p,"u_glowCoreIntensity");
const uGlowWideRadius=gl.getUniformLocation(p,"u_glowWideRadius");
const uGlowWideIntensity=gl.getUniformLocation(p,"u_glowWideIntensity");
const uWarpStrength=gl.getUniformLocation(p,"u_warpStrength");
const uNoiseAmount=gl.getUniformLocation(p,"u_noiseAmount");
const uDarkness=gl.getUniformLocation(p,"u_darkness");
const uWaveCount=gl.getUniformLocation(p,"u_waveCount");
const uWaveFreq=gl.getUniformLocation(p,"u_waveFreq");
const uWaveSpeed=gl.getUniformLocation(p,"u_waveSpeed");
const uRippleStrength=gl.getUniformLocation(p,"u_rippleStrength");
const uIdle=gl.getUniformLocation(p,"u_idle");
const uActiveBand=gl.getUniformLocation(p,"u_activeBand");
const uMouseX=gl.getUniformLocation(p,"u_mouseX");
const uPolarAngle=gl.getUniformLocation(p,"u_polarAngle");
const uPolarDist=gl.getUniformLocation(p,"u_polarDist");
const uOctaveDist=gl.getUniformLocation(p,"u_octaveDist");
const uHintBand0=gl.getUniformLocation(p,"u_hintBand0");
const uHintBand1=gl.getUniformLocation(p,"u_hintBand1");
const uFlickerSpeed=gl.getUniformLocation(p,"u_flickerSpeed");
const uFlickerAmount=gl.getUniformLocation(p,"u_flickerAmount");
const uWaveSharpness=gl.getUniformLocation(p,"u_waveSharpness");
const uGravityStrength=gl.getUniformLocation(p,"u_gravityStrength");
const uOctaveAmount=gl.getUniformLocation(p,"u_octaveAmount");
const uOctaveDirection=gl.getUniformLocation(p,"u_octaveDirection");
const uVelocity=gl.getUniformLocation(p,"u_velocity");
const uVelX=gl.getUniformLocation(p,"u_velX");

const tweak = {
  u_glowCoreRadius: 0.09,
  u_glowCoreIntensity: 1.4,
  u_glowWideRadius: 0.45,
  u_glowWideIntensity: 0.55,
  u_trailLag: 0.025,
  u_warpStrength: 0.6,
  u_noiseAmount: 0.35,
  u_darkness: 0.07,
  u_waveCount: 8,
  u_waveFreq: 8,
  u_waveSpeed: 1,
  u_rippleStrength: 0.8,
  u_flickerSpeed: 1.5,
  u_flickerAmount: 0.12,
  u_waveSharpness: 180,
};

function applyTweakUniforms() {
  gl.uniform1f(uGlowCoreRadius, tweak.u_glowCoreRadius);
  gl.uniform1f(uGlowCoreIntensity, tweak.u_glowCoreIntensity);
  gl.uniform1f(uGlowWideRadius, tweak.u_glowWideRadius);
  gl.uniform1f(uGlowWideIntensity, tweak.u_glowWideIntensity);
  gl.uniform1f(uWarpStrength, tweak.u_warpStrength);
  gl.uniform1f(uNoiseAmount, tweak.u_noiseAmount);
  gl.uniform1f(uDarkness, tweak.u_darkness);
  gl.uniform1f(uWaveCount, tweak.u_waveCount);
  gl.uniform1f(uWaveFreq, tweak.u_waveFreq);
  gl.uniform1f(uWaveSpeed, tweak.u_waveSpeed);
  gl.uniform1f(uRippleStrength, tweak.u_rippleStrength);
  gl.uniform1f(uFlickerSpeed, tweak.u_flickerSpeed);
  gl.uniform1f(uFlickerAmount, tweak.u_flickerAmount);
  gl.uniform1f(uWaveSharpness, tweak.u_waveSharpness);
}

const sliderDefs = [
  { key: "u_glowCoreRadius", label: "glow core radius", min: 0.02, max: 0.2, step: 0.001 },
  { key: "u_glowCoreIntensity", label: "glow core intensity", min: 0.5, max: 3, step: 0.01 },
  { key: "u_glowWideRadius", label: "glow wide radius", min: 0.1, max: 0.8, step: 0.01 },
  { key: "u_glowWideIntensity", label: "glow wide intensity", min: 0.1, max: 1, step: 0.01 },
  { key: "u_trailLag", label: "trail lag", min: 0.001, max: 0.08, step: 0.001 },
  { key: "u_warpStrength", label: "warp strength", min: 0.1, max: 1, step: 0.01 },
  { key: "u_noiseAmount", label: "noise amount", min: 0.1, max: 0.8, step: 0.01 },
  { key: "u_darkness", label: "darkness", min: 0.01, max: 0.15, step: 0.001 },
  { key: "u_waveCount", label: "wave count", min: 2, max: 12, step: 1 },
  { key: "u_waveFreq", label: "wave frequency", min: 2, max: 20, step: 0.5 },
  { key: "u_waveSpeed", label: "wave speed", min: 0, max: 3, step: 0.1 },
  { key: "u_rippleStrength", label: "ripple strength", min: 0, max: 2, step: 0.1 },
  { key: "u_flickerSpeed", label: "flicker speed", min: 0.1, max: 6.0, step: 0.1 },
  { key: "u_flickerAmount", label: "flicker amount", min: 0.0, max: 0.5, step: 0.01 },
  { key: "u_waveSharpness", label: "wave sharpness", min: 50, max: 1200, step: 10 },
];

const SCALES = {
  "C Major": [261.63, 293.66, 329.63, 349.23, 392.0, 440.0, 493.88, 523.25],
  Pentatonic: [261.63, 293.66, 329.63, 392.0, 440.0, 523.25, 587.33, 659.25],
  "Whole Tone": [261.63, 293.66, 329.63, 369.99, 415.3, 466.16, 523.25, 587.33],
  Overtone: [130.81, 261.63, 392.0, 523.25, 654.06, 784.88, 915.69, 1046.5],
  Dorian: [261.63, 293.66, 311.13, 349.23, 392.0, 440.0, 466.16, 523.25],
  Phrygian: [261.63, 277.18, 311.13, 349.23, 392.0, 415.3, 466.16, 523.25],
  Lydian: [261.63, 293.66, 329.63, 369.99, 392.0, 440.0, 493.88, 523.25],
  Mixolydian: [261.63, 293.66, 329.63, 349.23, 392.0, 440.0, 466.16, 523.25],
  Minor: [261.63, 293.66, 311.13, 349.23, 392.0, 415.3, 466.16, 523.25],
  "Harmonic Min": [261.63, 293.66, 311.13, 349.23, 392.0, 415.3, 493.88, 523.25],
  Chromatic: [261.63, 277.18, 293.66, 311.13, 329.63, 349.23, 369.99, 392.0],
};
let currentScale = SCALES["C Major"];
let currentFreq = currentScale[4];
let smoothBandY = 0.5;
let polarAngle = 0;
let polarDist = 0;
let smoothAngle = 0;
let smoothDist = 0;
const HARMONIC_HINTS = [
  [2, 4],
  [0, 3],
  [0, 4],
  [1, 5],
  [0, 6],
  [3, 7],
  [4, 0],
  [5, 0],
];
let soundAttack = 20;
let soundDecay = 400;
let soundVolume = 0.3;
let portamentoSensitivity = 0.5;
let vibratoDepthControl = 1.0;
let vibratoSpeedControl = 5.5;
let releaseTime = 1.5;
let velocityThreshold = 3;
let sustainLevel = 0.15;
let deadZoneSize = 0.15;
let gravityStrength = 0.3;
let gravityEnabled = true;
let octaveMix = 0.6;
let oscType = "sine";

function angleDiff(target, current) {
  let d = target - current;
  while (d > Math.PI) d -= Math.PI * 2;
  while (d < -Math.PI) d += Math.PI * 2;
  return d;
}

function getWellPositions() {
  return [0, 4, 7].map((d) => (d + 0.5) / 8.0);
}

const panel = document.getElementById("tweak-panel");
const readouts = {};
sliderDefs.forEach((def) => {
  const row = document.createElement("div");
  row.className = "tweak-row";
  const head = document.createElement("div");
  head.className = "tweak-head";
  const lab = document.createElement("span");
  lab.className = "tweak-label";
  lab.textContent = def.label;
  const val = document.createElement("span");
  val.className = "tweak-val";
  val.textContent = String(tweak[def.key]);
  readouts[def.key] = val;
  head.appendChild(lab);
  head.appendChild(val);
  const input = document.createElement("input");
  input.type = "range";
  input.min = String(def.min);
  input.max = String(def.max);
  input.step = String(def.step);
  input.value = String(tweak[def.key]);
  input.dataset.settingKey = def.key;
  input.addEventListener("input", () => {
    const x = parseFloat(input.value);
    tweak[def.key] = x;
    val.textContent = String(x);
  });
  row.appendChild(head);
  row.appendChild(input);
  panel.appendChild(row);
});

const scaleWrap = document.createElement("div");
scaleWrap.style.marginBottom = "12px";
const scaleHead = document.createElement("div");
scaleHead.style.cssText =
  "display:flex;justify-content:space-between;font-size:10px;letter-spacing:0.1em;color:rgba(255,150,80,0.6);margin-bottom:4px;";
const scaleLabel = document.createElement("span");
scaleLabel.textContent = "SCALE";
scaleHead.appendChild(scaleLabel);
const scaleSelect = document.createElement("select");
scaleSelect.id = "scaleSelect";
scaleSelect.style.cssText =
  "width:100%;background:#1a0800;color:rgba(255,150,80,0.9);border:1px solid rgba(255,100,40,0.3);font-family:'Courier New',monospace;font-size:11px;padding:4px;";
Object.keys(SCALES).forEach((name) => {
  const opt = document.createElement("option");
  opt.value = name;
  opt.textContent = name;
  scaleSelect.appendChild(opt);
});
scaleSelect.addEventListener("change", () => {
  currentScale = SCALES[scaleSelect.value];
});
scaleWrap.appendChild(scaleHead);
scaleWrap.appendChild(scaleSelect);
panel.appendChild(scaleWrap);

function appendSoundSlider(label, min, max, step, getVal, setVal, settingKey) {
  const row = document.createElement("div");
  row.className = "tweak-row";
  const head = document.createElement("div");
  head.className = "tweak-head";
  const lab = document.createElement("span");
  lab.className = "tweak-label";
  lab.textContent = label;
  const val = document.createElement("span");
  val.className = "tweak-val";
  val.textContent = String(getVal());
  head.appendChild(lab);
  head.appendChild(val);
  const input = document.createElement("input");
  input.type = "range";
  input.min = String(min);
  input.max = String(max);
  input.step = String(step);
  input.value = String(getVal());
  if (settingKey) input.dataset.settingKey = settingKey;
  input.addEventListener("input", () => {
    const x = parseFloat(input.value);
    setVal(x);
    val.textContent = String(x);
  });
  row.appendChild(head);
  row.appendChild(input);
  panel.appendChild(row);
}
appendSoundSlider(
  "attack ms",
  1,
  500,
  1,
  () => soundAttack,
  (v) => {
    soundAttack = v;
  },
  "soundAttack",
);
appendSoundSlider(
  "decay ms",
  50,
  2000,
  10,
  () => soundDecay,
  (v) => {
    soundDecay = v;
  },
  "soundDecay",
);
appendSoundSlider(
  "volume",
  0,
  1,
  0.01,

function refreshPanelFromState() {
  panel.querySelectorAll('input[type="range"][data-setting-key]').forEach((inp) => {
    const k = inp.dataset.settingKey;
    let v;
    if (Object.prototype.hasOwnProperty.call(tweak, k)) v = tweak[k];
    else if (k === "releaseTime") v = releaseTime;
    else if (k === "velocityThreshold") v = velocityThreshold;
    else if (k === "sustainLevel") v = sustainLevel;
    else if (k === "deadZoneSize") v = deadZoneSize;
    else if (k === "soundAttack") v = soundAttack;
    else if (k === "soundDecay") v = soundDecay;
    else if (k === "soundVolume") v = soundVolume;
    else if (k === "portamentoSensitivity") v = portamentoSensitivity;
    else if (k === "vibratoDepthControl") v = vibratoDepthControl;
    else if (k === "vibratoSpeedControl") v = vibratoSpeedControl;
    else if (k === "gravityStrength") v = gravityStrength;
    else if (k === "octaveMix") v = octaveMix;
    else return;
    inp.value = String(v);
    const row = inp.closest(".tweak-row");
    const valEl = row && row.querySelector(".tweak-val");
    if (valEl) valEl.textContent = String(v);
  });
}

function applyImportedSettings(o) {
  if (!o || typeof o !== "object") return;
  const n = (x) => typeof x === "number" && !Number.isNaN(x);
  for (const key of Object.keys(tweak)) {
    if (n(o[key])) tweak[key] = o[key];
  }
  if (n(o.releaseTime)) releaseTime = o.releaseTime;
  if (n(o.velocityThreshold)) velocityThreshold = o.velocityThreshold;
  if (n(o.sustainLevel)) sustainLevel = o.sustainLevel;
  if (n(o.deadZoneSize)) deadZoneSize = o.deadZoneSize;
  if (n(o.soundAttack)) soundAttack = o.soundAttack;
  if (n(o.soundDecay)) soundDecay = o.soundDecay;
  if (n(o.soundVolume)) soundVolume = o.soundVolume;
  if (n(o.portamentoSensitivity)) portamentoSensitivity = o.portamentoSensitivity;
  if (n(o.vibratoDepthControl)) vibratoDepthControl = o.vibratoDepthControl;
  if (n(o.vibratoSpeedControl)) vibratoSpeedControl = o.vibratoSpeedControl;
  if (n(o.gravityStrength)) gravityStrength = o.gravityStrength;
  if (typeof o.gravityEnabled === "boolean") gravityEnabled = o.gravityEnabled;
  if (n(o.octaveMix)) octaveMix = o.octaveMix;
  syncGravityToggleButtons();
  refreshPanelFromState();
}

let audioCtx = null;
let lastBand = -1;
let activeGain = null;
let activeBand = -1;
let hintFaded = false;
let glideOsc1 = null;
let glideOsc2 = null;
let glideGain = null;
let glideG1 = null;
let glideG2 = null;
let glideNode = null;
let octaveLayerGain = null;
let octaveLayerOsc1 = null;
let octaveLayerOsc2 = null;
let octaveLayerGainNode = null;
let octaveLayerG1 = null;
let octaveLayerG2 = null;
let octaveDirection = 0;
let octaveAmount = 0.0;

function initGlide() {
  if (!audioCtx || glideOsc1) return;
  glideOsc1 = audioCtx.createOscillator();
  glideOsc2 = audioCtx.createOscillator();
  glideG1 = audioCtx.createGain();
  glideG2 = audioCtx.createGain();
  glideGain = audioCtx.createGain();
  const glideFilter = audioCtx.createBiquadFilter();
  glideOsc1.type = "sine";
  glideOsc2.type = "sawtooth";
  glideOsc1.frequency.value = currentFreq;
  glideOsc2.frequency.value = currentFreq;
  glideG1.gain.value = 0.6;
  glideG2.gain.value = 0.1;
  glideGain.gain.value = 0.0;
  glideFilter.type = "lowpass";
  glideFilter.frequency.value = 800;
  glideOsc1.connect(glideG1);
  glideG1.connect(glideFilter);
  glideOsc2.connect(glideG2);
  glideG2.connect(glideFilter);
  glideFilter.connect(glideGain);
  glideGain.connect(audioCtx.destination);
  glideOsc1.start();
  glideOsc2.start();
}

function initOctaveLayer() {
  if (!audioCtx || octaveLayerOsc1) return;
  octaveLayerOsc1 = audioCtx.createOscillator();
  octaveLayerOsc2 = audioCtx.createOscillator();
  const og1 = audioCtx.createGain();
  const og2 = audioCtx.createGain();
  octaveLayerGainNode = audioCtx.createGain();
  const octFilter = audioCtx.createBiquadFilter();

  octaveLayerOsc1.type = "sine";
  octaveLayerOsc2.type = "sawtooth";
  og1.gain.value = 0.7;
  og2.gain.value = 0.15;
  octaveLayerGainNode.gain.value = 0.0;
  octFilter.type = "lowpass";
  octFilter.frequency.value = 600;

  octaveLayerOsc1.connect(og1);
  og1.connect(octFilter);
  octaveLayerOsc2.connect(og2);
  og2.connect(octFilter);
  octFilter.connect(octaveLayerGainNode);
  octaveLayerGainNode.connect(audioCtx.destination);

  octaveLayerG1 = og1;
  octaveLayerG2 = og2;
  octaveLayerGain = octaveLayerGainNode;

  octaveLayerOsc1.start();
  octaveLayerOsc2.start();
}

function initAudio() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === "suspended") audioCtx.resume();
  initGlide();
  initOctaveLayer();
}

function playNoteWithVolume(bandIndex, vol) {
  if (!audioCtx) return;
  const freq = currentScale[bandIndex];
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain1 = audioCtx.createGain();
  const gain2 = audioCtx.createGain();
  const master = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc1.type = "sine";
  osc2.type = "sawtooth";
  osc1.frequency.value = freq;
  osc2.frequency.value = freq;
  const blend = mouseX;
  gain1.gain.value = 1.0 - blend * 0.8;
  gain2.gain.value = blend * 0.4;
  filter.type = "lowpass";
  filter.frequency.value = 400 + mouseX * 3600;
  filter.Q.value = 1.5;
  const t0 = audioCtx.currentTime;
  master.gain.setValueAtTime(0.0, t0);
  master.gain.linearRampToValueAtTime(vol, t0 + soundAttack / 1000);
  master.gain.exponentialRampToValueAtTime(0.001, t0 + soundDecay / 1000);
  osc1.connect(gain1);
  gain1.connect(filter);
  osc2.connect(gain2);
  gain2.connect(filter);
  filter.connect(master);
  master.connect(audioCtx.destination);
  osc1.start();
  osc2.start();
  osc1.stop(t0 + soundDecay / 1000 + 0.1);
  osc2.stop(t0 + soundDecay / 1000 + 0.1);
  activeBand = bandIndex;
  setTimeout(() => {
    if (activeBand === bandIndex) activeBand = -1;
  }, 300);
}

function playNote(b) {
  playNoteWithVolume(b, soundVolume);
}

let mx=innerWidth/2,my=innerHeight/2,tx=mx,ty=my;
let mouseX=0.5;
let prevTmy=ty;
let prevTmx=tx;
let mouseVelocity=0;
let smoothVelocity=0;
let mouseVelX=0;
let smoothVelX=0;
let dwellTime=0;
let lastBandY=-1;
let mouseStillTime=0;
let mx2=mx,my2=my;
let lastMoveTime=performance.now();
let idleBreath=0;
document.addEventListener("mousemove", (e) => {
  initAudio();
  if (!hintFaded) {
    hintFaded = true;
    const h = document.getElementById("hint");
    h.style.opacity = "0";
    h.style.transition = "opacity 1s";
  }
  tx = e.clientX;
  ty = e.clientY;
  mouseX = e.clientX / window.innerWidth;
  lastMoveTime = performance.now();
});
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;gl.viewport(0,0,canvas.width,canvas.height);}
window.addEventListener("resize",resize);resize();
function frame(t){
  const tmx=tx;
  const tmy=ty;
  const rawVel=Math.abs(tmy-prevTmy);
  prevTmy=tmy;
  mouseVelocity=rawVel;
  smoothVelocity+=(rawVel-smoothVelocity)*0.15;
  const rawVelX=Math.abs(tmx-prevTmx);
  prevTmx=tmx;
  mouseVelX=rawVelX;
  smoothVelX+=(rawVelX-smoothVelX)*0.15;
  const totalVel=smoothVelocity+smoothVelX;
  const isMovingPolar=totalVel>1.5;
  if (isMovingPolar) {
    mouseStillTime=0;
  } else {
    mouseStillTime+=0.016;
  }
  mx+=(tx-mx)*.08;my+=(ty-my)*.08;
  const lag=tweak.u_trailLag;
  mx2+=(mx-mx2)*lag;my2+=(my-my2)*lag;
  const idle=Math.min(1.0,(performance.now()-lastMoveTime)/2000.0);
  idleBreath+=(idle-idleBreath)*0.02;
  const cx=window.innerWidth/2;
  const cy=window.innerHeight/2;
  const dx=tmx-cx;
  const dy=tmy-cy;
  const maxDist=Math.min(cx,cy)*0.85;
  polarAngle=Math.atan2(dy,dx);
  polarDist=maxDist>0?Math.min(Math.sqrt(dx*dx+dy*dy)/maxDist,1.0):0;
  smoothAngle+=angleDiff(polarAngle,smoothAngle)*0.06;
  smoothDist+=(polarDist-smoothDist)*0.05;
  const normY=1.0-tmy/window.innerHeight;
  const rawBand=normY*8;
  const clampedBand=Math.max(0,Math.min(7,Math.floor(rawBand)));
  const bandFraction=rawBand-Math.floor(rawBand);
  const inDeadZone=bandFraction<deadZoneSize||
    bandFraction>(1-deadZoneSize);
  const shouldTrigger=!inDeadZone||
    smoothVelocity>velocityThreshold;
  const sensitivity=portamentoSensitivity;
  const glideSpeed=0.02+(1.0-sensitivity)*0.08-sensitivity*smoothVelocity*0.002;
  const clampedGlide=Math.max(0.01,Math.min(0.12,glideSpeed));
  smoothBandY+=(normY-smoothBandY)*clampedGlide;
  if (gravityEnabled) {
    const wells=getWellPositions();
    let totalPull=0;
    wells.forEach((wellY)=>{
      const dist=Math.abs(smoothBandY-wellY);
      const pull=gravityStrength*Math.exp(-dist*6.0)*0.4;
      totalPull+=(wellY-smoothBandY)*pull;
    });
    const maxPull=0.004;
    smoothBandY+=Math.max(-maxPull,Math.min(maxPull,totalPull));
    smoothBandY=Math.max(0,Math.min(1,smoothBandY));
  }
  const isSettling=smoothVelocity<
    velocityThreshold+portamentoSensitivity*8;
  if (clampedBand!==lastBand&&isSettling&&shouldTrigger) {
    lastBand=clampedBand;
    const velVolume=soundVolume*
      (0.4+Math.min(smoothVelocity/15.0,0.6));
    playNoteWithVolume(clampedBand,velVolume);
  }
  const targetBand=Math.max(0,Math.min(7,Math.floor(smoothBandY*8)));
  const targetFreq=currentScale[targetBand];
  const freqGlide=0.03+(1.0-sensitivity)*0.08;
  if (glideOsc1&&audioCtx) {
    currentFreq+=(targetFreq-currentFreq)*freqGlide;
    const distPressure=smoothDist>0.9?(smoothDist-0.9)*10.0:0.0;
    octaveAmount+=(distPressure-octaveAmount)*0.04;
    octaveDirection=smoothDist>=0.5?1:-1;
    if (octaveLayerOsc1&&audioCtx) {
      const octFreq=currentFreq*2.0;
      octaveLayerOsc1.frequency.setValueAtTime(octFreq,audioCtx.currentTime);
      octaveLayerOsc2.frequency.setValueAtTime(octFreq,audioCtx.currentTime);
      const octBlend=mouseX;
      if (octaveLayerG1&&octaveLayerG2) {
        octaveLayerG1.gain.setValueAtTime(1.0-octBlend*0.8,audioCtx.currentTime);
        octaveLayerG2.gain.setValueAtTime(octBlend*0.4,audioCtx.currentTime);
      }
    }
    const sustainFade=Math.max(0,1.0-mouseStillTime/releaseTime);
    if (octaveLayerOsc1&&audioCtx&&octaveLayerGainNode) {
      const octVol=octaveAmount*soundVolume*sustainFade*octaveMix;
      octaveLayerGainNode.gain.setTargetAtTime(octVol,audioCtx.currentTime,0.15);
    }
    if (clampedBand===lastBand) {
      const vibratoDepth=smoothVelX*0.4*vibratoDepthControl;
      const vibrato=Math.sin(performance.now()*0.001*
        vibratoSpeedControl)*vibratoDepth;
      glideOsc1.frequency.setValueAtTime(currentFreq+vibrato,audioCtx.currentTime);
      glideOsc2.frequency.setValueAtTime(currentFreq+vibrato,audioCtx.currentTime);
    } else {
      glideOsc1.frequency.setValueAtTime(currentFreq,audioCtx.currentTime);
      glideOsc2.frequency.setValueAtTime(currentFreq,audioCtx.currentTime);
    }
    const holdingNote=clampedBand===lastBand;
    const sustainBoost=holdingNote?
      Math.min(smoothVelX/10.0,0.3):0.0;
    const targetGlideVol=soundVolume*
      (sustainLevel+sustainBoost)*sustainFade;
    if (glideGain&&audioCtx) {
      glideGain.gain.setTargetAtTime(targetGlideVol,audioCtx.currentTime,0.3);
    }
    const blend=mouseX;
    glideG1.gain.setValueAtTime(1.0-blend*0.8,audioCtx.currentTime);
    glideG2.gain.setValueAtTime(blend*0.4,audioCtx.currentTime);
  }
  gl.uniform2f(ur,canvas.width,canvas.height);
  gl.uniform2f(um,mx,canvas.height-my);
  gl.uniform2f(um2,mx2,canvas.height-my2);
  gl.uniform1f(ut,t*.001);
  gl.uniform1f(uIdle,idleBreath);
  gl.uniform1f(uActiveBand,clampedBand);
  gl.uniform1f(uMouseX,mouseX);
  gl.uniform1f(uPolarAngle,smoothAngle);
  gl.uniform1f(uPolarDist,smoothDist);
  gl.uniform1f(uOctaveDist,smoothDist);
  gl.uniform1f(
    uGravityStrength,
    gravityEnabled ? gravityStrength : 0.0
  );
  gl.uniform1f(uOctaveAmount, octaveAmount);
  gl.uniform1f(uOctaveDirection, octaveDirection);
  gl.uniform1f(uVelocity,Math.min(smoothVelocity/20.0,1.0));
  gl.uniform1f(uVelX,Math.min(smoothVelX/15.0,1.0));
  if (activeBand>=0&&activeBand<8) {
    const hints=HARMONIC_HINTS[activeBand];
    gl.uniform1f(uHintBand0,hints[0]);
    gl.uniform1f(uHintBand1,hints[1]);
  } else {
    gl.uniform1f(uHintBand0,-1.0);
    gl.uniform1f(uHintBand1,-1.0);
  }
  applyTweakUniforms();
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  requestAnimationFrame(frame);
}
applyTweakUniforms();
requestAnimationFrame(frame);
</script>
