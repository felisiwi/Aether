function createImpulseResponse(ctx,duration=2,decay=2){const len=Math.floor(ctx.sampleRate*duration),ir=ctx.createBuffer(2,len,ctx.sampleRate);for(let ch=0;ch<2;ch++){const data=ir.getChannelData(ch);for(let i=0;i<len;i++){const t=i/len;data[i]=(Math.random()*2-1)*Math.pow(1-t,decay);}}return ir;}
async function initMic(){try{const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});const src=audioCtx.createMediaStreamSource(stream);micAnalyser=audioCtx.createAnalyser();micAnalyser.fftSize=512;src.connect(micAnalyser);}catch(e){console.log("Mic unavailable");}}
function initSympathetic(){if(!audioCtx||sympatheticOscs.length>0)return;for(let i=0;i<8;i++){const osc=audioCtx.createOscillator(),gain=audioCtx.createGain(),filter=audioCtx.createBiquadFilter(),freq=noteFreqForBand(i);osc.type="sine";osc.frequency.value=freq;gain.gain.value=0;filter.type="bandpass";filter.Q.value=8;filter.frequency.value=freq;osc.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);osc.start();sympatheticOscs.push(osc);sympatheticGains.push(gain);sympatheticFilters.push(filter);}}
function initGlide(){if(!audioCtx||glideOsc1)return;glideOsc1=audioCtx.createOscillator();glideOsc2=audioCtx.createOscillator();glideG1=audioCtx.createGain();glideG2=audioCtx.createGain();glideGain=audioCtx.createGain();const f=audioCtx.createBiquadFilter();glideOsc1.type="sine";glideOsc2.type="sawtooth";glideOsc1.frequency.value=currentFreq;glideOsc2.frequency.value=currentFreq;glideG1.gain.value=.6;glideG2.gain.value=.1;glideGain.gain.value=0;f.type="lowpass";f.frequency.value=800;glideOsc1.connect(glideG1);glideG1.connect(f);glideOsc2.connect(glideG2);glideG2.connect(f);f.connect(glideGain);glideGain.connect(audioCtx.destination);glideOsc1.start();glideOsc2.start();}
function initOctaveLayer(){if(!audioCtx||octaveLayerOsc1)return;octaveLayerOsc1=audioCtx.createOscillator();octaveLayerOsc2=audioCtx.createOscillator();octaveLayerG1=audioCtx.createGain();octaveLayerG2=audioCtx.createGain();octaveLayerGainNode=audioCtx.createGain();const f=audioCtx.createBiquadFilter();octaveLayerOsc1.type="sine";octaveLayerOsc2.type="sawtooth";octaveLayerG1.gain.value=.7;octaveLayerG2.gain.value=.15;octaveLayerGainNode.gain.value=0;f.type="lowpass";f.frequency.value=600;octaveLayerOsc1.connect(octaveLayerG1);octaveLayerG1.connect(f);octaveLayerOsc2.connect(octaveLayerG2);octaveLayerG2.connect(f);f.connect(octaveLayerGainNode);octaveLayerGainNode.connect(audioCtx.destination);octaveLayerOsc1.start();octaveLayerOsc2.start();}
async function initAudio(){if(!audioCtx)audioCtx=new AudioContext();if(audioCtx.state==="suspended")await audioCtx.resume();initGlide();initOctaveLayer();initSympathetic();if(!micAnalyser)await initMic();}
function playNoteWithVolume(bandIndex,vol){if(!audioCtx)return;noteFlash=1;splatIntensity=1;splatX=mx/canvas.width;splatY=1-(my/canvas.height);splatAge=0;const freq=noteFreqForBand(bandIndex),osc1=audioCtx.createOscillator(),osc2=audioCtx.createOscillator(),gain1=audioCtx.createGain(),gain2=audioCtx.createGain(),master=audioCtx.createGain(),filter=audioCtx.createBiquadFilter(),convolver=audioCtx.createConvolver(),wet=audioCtx.createGain(),dry=audioCtx.createGain();convolver.buffer=createImpulseResponse(audioCtx,1.8,2.4);wet.gain.value=.22;dry.gain.value=.78;osc1.type=oscType;osc2.type="sawtooth";osc1.frequency.value=freq;osc2.frequency.value=freq;const blend=mouseX;gain1.gain.value=1-blend*.8;gain2.gain.value=blend*.4;filter.type="lowpass";filter.frequency.value=400+mouseX*3600;filter.Q.value=1.5;const t0=audioCtx.currentTime;master.gain.setValueAtTime(0,t0);master.gain.linearRampToValueAtTime(vol,t0+soundAttack/1000);master.gain.exponentialRampToValueAtTime(.001,t0+soundDecay/1000);osc1.connect(gain1);gain1.connect(filter);osc2.connect(gain2);gain2.connect(filter);filter.connect(dry);filter.connect(convolver);convolver.connect(wet);dry.connect(master);wet.connect(master);master.connect(audioCtx.destination);osc1.start();osc2.start();osc1.stop(t0+soundDecay/1000+.1);osc2.stop(t0+soundDecay/1000+.1);activeBand=bandIndex;setTimeout(()=>{if(activeBand===bandIndex)activeBand=-1;},300);}
function playNote(b){playNoteWithVolume(b,soundVolume);}
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;gl.viewport(0,0,canvas.width,canvas.height);}window.addEventListener("resize",resize);resize();
function bindSensors(){window.addEventListener("deviceorientation",e=>{tiltBeta=e.beta||0;tiltGamma=e.gamma||0;tiltAlpha=e.alpha||0;tiltActive=true;});}
async function requestSensorPermission(){if(typeof DeviceOrientationEvent!=="undefined"&&typeof DeviceOrientationEvent.requestPermission==="function"){const state=await DeviceOrientationEvent.requestPermission();if(state==="granted"){motionPermissionGranted=true;bindSensors();}}else{motionPermissionGranted=true;bindSensors();}}
canvas.addEventListener("touchstart",e=>{e.preventDefault();initAudio();const t=e.touches[0];touchActive=true;touchX=t.clientX/window.innerWidth;touchY=t.clientY/window.innerHeight;prevClientX=t.clientX;prevClientY=t.clientY;lastMoveTime=performance.now();},{passive:false});
canvas.addEventListener("touchmove",e=>{e.preventDefault();const t=e.touches[0];touchVelX=Math.abs(t.clientX-prevClientX);touchVelY=Math.abs(t.clientY-prevClientY);touchX=t.clientX/window.innerWidth;touchY=t.clientY/window.innerHeight;prevClientX=t.clientX;prevClientY=t.clientY;lastMoveTime=performance.now();},{passive:false});
canvas.addEventListener("touchend",e=>{e.preventDefault();touchActive=false;touchVelX=0;touchVelY=0;},{passive:false});
const NOTE_NAMES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function getNoteName(bandIndex){const freq=noteFreqForBand(bandIndex);const midi=Math.round(69+12*Math.log2(freq/440));return NOTE_NAMES[((midi%12)+12)%12];}
function updateKeyIndicator(){const root=((targetScrollSemitones%12)+12)%12;document.getElementById("ph-key").textContent=NOTE_NAMES[root];}
document.getElementById("ph-start").addEventListener("click",async()=>{await initAudio();await requestSensorPermission();document.getElementById("ph-overlay").style.display="none";if(audioCtx.state==="suspended")audioCtx.resume();});
const scaleRow=document.getElementById("ph-scales");
Object.keys(SCALES).forEach((name)=>{const btn=document.createElement("button");btn.textContent=name;btn.style.cssText=`flex-shrink:0;padding:7px 10px;background:rgba(255,100,30,0.06);border:1px solid rgba(255,100,30,0.15);border-radius:4px;color:rgba(255,150,50,0.45);font-family:'Courier New',monospace;font-size:9px;letter-spacing:0.06em;cursor:pointer;white-space:nowrap;`;if(name===currentScaleName){btn.style.background="rgba(255,100,30,0.22)";btn.style.color="rgba(255,180,80,0.9)";}btn.addEventListener("click",()=>{currentScale=SCALES[name];currentScaleName=name;scaleRow.querySelectorAll("button").forEach((b)=>{b.style.background="rgba(255,100,30,0.06)";b.style.color="rgba(255,150,50,0.45)";});btn.style.background="rgba(255,100,30,0.22)";btn.style.color="rgba(255,180,80,0.9)";});scaleRow.appendChild(btn);});
document.getElementById("ph-hang").addEventListener("click",()=>{hangDrumEnabled=!hangDrumEnabled;document.getElementById("ph-hang").textContent=hangDrumEnabled?"HANG ✓":"HANG ✗";});
document.getElementById("ph-gravity").addEventListener("click",()=>{gravityEnabled=!gravityEnabled;document.getElementById("ph-gravity").textContent=gravityEnabled?"GRAV ✓":"GRAV ✗";});
document.getElementById("ph-oct").addEventListener("click",()=>{baseOctave=baseOctave>=5?3:baseOctave+1;document.getElementById("ph-oct").textContent=`OCT ${baseOctave}`;});
document.getElementById("ph-key-up").addEventListener("click",()=>{targetScrollSemitones=Math.min(12,targetScrollSemitones+1);updateKeyIndicator();});
document.getElementById("ph-key-down").addEventListener("click",()=>{targetScrollSemitones=Math.max(-12,targetScrollSemitones-1);updateKeyIndicator();});
function frame(t){
  tweak.u_glowCoreRadius=glowSize*.25; tweak.u_glowWideRadius=glowSize*1.2; tweak.u_glowCoreIntensity=glowIntensity*1.8; tweak.u_glowWideIntensity=glowIntensity*.45;
  smoothScrollSemitones+=(targetScrollSemitones-smoothScrollSemitones)*.03; scrollFreqMult=Math.pow(2,smoothScrollSemitones/12); splatAge+=.016; splatIntensity*=.92;
  const tiltNorm=Math.max(0,Math.min(1,(tiltBeta+60)/120));
  const normY=touchActive?(1-touchY):tiltNorm;
  const rawVel=touchActive?(touchVelY+touchVelX):Math.abs(tiltNorm-smoothBandY)*40; smoothVelocity+=(rawVel-smoothVelocity)*.15;
  const gammaVel=Math.abs(tiltGamma-45)/45; smoothVelX+=(gammaVel*10-smoothVelX)*.1;
  mouseX=Math.max(0,Math.min(1,(tiltGamma+45)/90));
  const tmx=touchActive?touchX*window.innerWidth:window.innerWidth/2, tmy=touchActive?touchY*window.innerHeight:(1-tiltNorm)*window.innerHeight;
  mx+=(tmx-mx)*tweak.u_trailLag; my+=(tmy-my)*tweak.u_trailLag; mx2+=(mx-mx2)*tweak.u_trailLag; my2+=(my-my2)*tweak.u_trailLag;
  const totalVel=smoothVelocity+smoothVelX; if(totalVel>1.5)mouseStillTime=0; else mouseStillTime+=.016;
  const idle=Math.min(1,(performance.now()-lastMoveTime)/2000); idleBreath+=(idle-idleBreath)*.02;
  const cx=innerWidth/2, cy=innerHeight/2, dx=tmx-cx, dy=tmy-cy, maxDist=Math.min(cx,cy)*.85; polarAngle=Math.atan2(dy,dx); polarDist=maxDist>0?Math.min(Math.sqrt(dx*dx+dy*dy)/maxDist,1):0; smoothAngle+=angleDiff(polarAngle,smoothAngle)*.06; smoothDist+=(polarDist-smoothDist)*.05;
  const rawBand=normY*8, clampedBand=Math.max(0,Math.min(7,Math.floor(rawBand))), bandFraction=rawBand-Math.floor(rawBand), inDeadZone=bandFraction<deadZoneSize||bandFraction>(1-deadZoneSize), shouldTrigger=!inDeadZone||smoothVelocity>velocityThreshold;
  const sensitivity=portamentoSensitivity, glideSpeed=.02+(1-sensitivity)*.08-sensitivity*smoothVelocity*.002, clampedGlide=Math.max(.01,Math.min(.12,glideSpeed)); smoothBandY+=(normY-smoothBandY)*clampedGlide;
  if(gravityEnabled){const wells=getWellPositions(); let totalPull=0; wells.forEach((wellY)=>{const dist=Math.abs(smoothBandY-wellY),pull=gravityStrength*Math.exp(-dist*6)*.4; totalPull+=(wellY-smoothBandY)*pull;}); smoothBandY+=Math.max(-.004,Math.min(.004,totalPull)); smoothBandY=Math.max(0,Math.min(1,smoothBandY));}
  const targetBand=Math.max(0,Math.min(7,Math.floor(smoothBandY*8))), targetFreq=noteFreqForBand(targetBand), isSettling=smoothVelocity<velocityThreshold+portamentoSensitivity*8;
  if(clampedBand!==lastBand&&isSettling&&shouldTrigger){lastBand=clampedBand;const velVolume=soundVolume*(.4+Math.min(smoothVelocity/15,.6));playNoteWithVolume(clampedBand,velVolume);}
  if(activeBand>=0){const noteEl=document.getElementById("ph-note");if(noteEl){noteEl.textContent=getNoteName(activeBand);noteEl.style.color="rgba(255,160,60,0.85)";setTimeout(()=>{noteEl.style.color="rgba(255,160,60,0.0)";},600);}}
  if(micAnalyser){const data=new Uint8Array(micAnalyser.frequencyBinCount);micAnalyser.getByteFrequencyData(data);let sum=0;for(let i=0;i<data.length;i++)sum+=data[i];const rms=(sum/data.length)/255;breathLevel=rms;breathSmooth+=(Math.min(rms*4,1)-breathSmooth)*.08;}
  const breathBoost=breathSmooth*.6, sustainFade=Math.max(0,1-mouseStillTime/releaseTime), holding=clampedBand===lastBand, sustainBoost=holding?Math.min(smoothVelX/10,.3):0, glideVolTarget=soundVolume*(sustainLevel+sustainBoost+breathBoost)*sustainFade;
  const soundActive=glideVolTarget>.01||(activeBand>=0&&activeBand<8)||noteFlash>.05; if(soundActive||totalVel>.5){logoIdleTime=0;logoPresence+=(1-logoPresence)*.04;}else{logoIdleTime+=.016;if(logoIdleTime>2)logoPresence+=(0-logoPresence)*.008;}
  noteFlash*=.88;
  if(glideOsc1&&audioCtx){currentFreq+=(targetFreq-currentFreq)*(.03+(1-sensitivity)*.08);const distPressure=smoothDist>.9?(smoothDist-.9)*10:0;octaveAmount+=(distPressure-octaveAmount)*.04;octaveDirection=smoothDist>=.5?1:-1;if(octaveLayerOsc1){const octFreq=currentFreq*2;octaveLayerOsc1.frequency.setValueAtTime(octFreq,audioCtx.currentTime);octaveLayerOsc2.frequency.setValueAtTime(octFreq,audioCtx.currentTime);octaveLayerG1.gain.setValueAtTime(1-mouseX*.8,audioCtx.currentTime);octaveLayerG2.gain.setValueAtTime(mouseX*.4,audioCtx.currentTime);octaveLayerGainNode.gain.setTargetAtTime(octaveAmount*soundVolume*sustainFade*octaveMix,audioCtx.currentTime,.15);}if(holding){const vibrato=Math.sin(performance.now()*.001*vibratoSpeedControl)*(smoothVelX*.4*vibratoDepthControl);glideOsc1.frequency.setValueAtTime(currentFreq+vibrato,audioCtx.currentTime);glideOsc2.frequency.setValueAtTime(currentFreq+vibrato,audioCtx.currentTime);}else{glideOsc1.frequency.setValueAtTime(currentFreq,audioCtx.currentTime);glideOsc2.frequency.setValueAtTime(currentFreq,audioCtx.currentTime);}glideGain.gain.setTargetAtTime(glideVolTarget,audioCtx.currentTime,.3);glideG1.gain.setValueAtTime(1-mouseX*.8,audioCtx.currentTime);glideG2.gain.setValueAtTime(mouseX*.4,audioCtx.currentTime);}
  if(sympatheticOscs.length>0&&audioCtx){for(let i=0;i<8;i++){const freq=noteFreqForBand(i);sympatheticOscs[i].frequency.setValueAtTime(freq,audioCtx.currentTime);sympatheticFilters[i].frequency.setValueAtTime(freq,audioCtx.currentTime);const isActive=i===lastBand,isNeighbour=lastBand>=0&&(Math.abs(i-lastBand)===1||Math.abs(i-lastBand)===7),isHintBand=lastBand>=0&&(HARMONIC_HINTS[lastBand]||[]).includes(i);let targetLevel=0;if(isActive)targetLevel=sympatheticMix*.3;else if(isHintBand)targetLevel=sympatheticMix*.5;else if(isNeighbour)targetLevel=sympatheticMix*.2;targetLevel*=sustainFade;sympatheticLevels[i]+=(targetLevel-sympatheticLevels[i])*.015;sympatheticGains[i].gain.setTargetAtTime(sympatheticLevels[i],audioCtx.currentTime,.3);}}
  gl.uniform2f(ur,canvas.width,canvas.height); gl.uniform2f(um,mx,canvas.height-my); gl.uniform2f(um2,mx2,canvas.height-my2); gl.uniform1f(ut,t*.001); gl.uniform1f(uIdle,idleBreath); gl.uniform1f(uActiveBand,clampedBand); gl.uniform1f(uMouseX,mouseX); gl.uniform1f(uSmoothBandY,smoothBandY); gl.uniform1f(uGravityStrength,gravityEnabled?gravityStrength:0); gl.uniform1f(uOctaveAmount,octaveAmount); gl.uniform1f(uOctaveDirection,octaveDirection); gl.uniform1f(uVelocity,Math.min(smoothVelocity/20,1)); gl.uniform1f(uVelX,Math.min(smoothVelX/15,1)); gl.uniform1f(uHangDrum,hangDrumEnabled?1:0); gl.uniform1fv(uSympathetic,sympatheticLevels); gl.uniform1f(uDrift,Math.max(.35,idleBreath*.8+.45)); gl.uniform1f(uLogoPresence,logoPresence); gl.uniform1f(uNoteFlash,noteFlash); gl.uniform1f(uSplatIntensity,splatIntensity); gl.uniform2f(uSplatPos,splatX,splatY); gl.uniform1f(uSplatAge,splatAge); gl.uniform1f(uActiveBandNorm,clampedBand/7);
  if(activeBand>=0&&activeBand<8){const hints=HARMONIC_HINTS[activeBand];gl.uniform1f(uHintBand0,hints[0]);gl.uniform1f(uHintBand1,hints[1]);}else{gl.uniform1f(uHintBand0,-1);gl.uniform1f(uHintBand1,-1);}
  applyTweakUniforms(); gl.drawArrays(gl.TRIANGLE_STRIP,0,4); requestAnimationFrame(frame);
}
applyTweakUniforms(); updateKeyIndicator(); requestAnimationFrame(frame);
